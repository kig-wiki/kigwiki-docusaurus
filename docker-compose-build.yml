services:
  build:
    container_name: kigwiki-build
    build: ./
    working_dir: /repo/kigwiki-docusaurus
    volumes:
      - ../:/repo
      - /repo/kigwiki-docusaurus/node_modules
      - /repo/kigwiki-docusaurus/.docusaurus
    environment:
      - NODE_ENV=production
    command: npm run build
